<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GNS — Graph Name System</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">◍</span>
      <div>
        <h1>Graph Name System</h1>
        <p class="tag">Resolve names through the Nostr social graph</p>
      </div>
    </div>
    <div id="mode" class="mode"></div>
  </header>

  <main>
    <section class="controls">
      <div class="tabs">
        <button type="button" class="tab active" data-mode="name">By name</button>
        <button type="button" class="tab" data-mode="pubkey">By pubkey</button>
        <button type="button" class="tab" data-mode="followers">Followers</button>
      </div>

      <form id="resolve-form">
        <div class="mode-fields" data-fields="name pubkey">
          <label>
            From <span class="hint">(your pubkey — npub or hex)</span>
            <input id="from" name="from" placeholder="npub1…" autocomplete="off" spellcheck="false" />
          </label>
        </div>

        <div class="mode-fields" data-fields="name">
          <label>
            GNS name <span class="hint">(e.g. barbara@alex.michael.nostr)</span>
            <input id="name" name="name" placeholder="barbara@alex.michael.nostr" autocomplete="off" spellcheck="false" />
          </label>
        </div>

        <div class="mode-fields" data-fields="pubkey" hidden>
          <label>
            To <span class="hint">(target pubkey — npub or hex)</span>
            <input id="to" name="to" placeholder="npub1…" autocomplete="off" spellcheck="false" />
          </label>
          <label class="depth">
            Max depth
            <input id="max_depth" name="max_depth" type="number" min="1" max="12" value="6" />
          </label>
        </div>

        <div class="mode-fields" data-fields="followers" hidden>
          <label>
            Pubkey <span class="hint">(whose followers — npub or hex)</span>
            <input id="follower-pubkey" name="follower-pubkey" placeholder="npub1…" autocomplete="off" spellcheck="false" />
          </label>
        </div>

        <div class="buttons">
          <button type="submit" id="resolve-btn">Resolve</button>
          <button type="button" id="demo-btn" class="ghost" hidden>Load demo example</button>
        </div>
      </form>
      <div id="status" class="status"></div>
      <div id="address" class="address"></div>
    </section>

    <section id="viz" class="viz">
      <canvas id="graph"></canvas>
    </section>

    <section id="details" class="details" hidden>
      <h2>Resolution path</h2>
      <ol id="hops"></ol>
    </section>

    <section id="followers-result" class="details" hidden>
      <div id="followers-head" class="followers-head"></div>
      <ul id="follower-list" class="follower-list"></ul>
      <button type="button" id="load-more" class="ghost" hidden>Load more</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
